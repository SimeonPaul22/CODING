{% extends "base.html" %}

{% block content %}
  <section class="mx-auto max-w-2xl rounded-3xl border border-slate-200 bg-white p-8 shadow-md shadow-slate-100">
    <div class="mb-6">
      <p class="text-sm uppercase tracking-[0.3em] text-indigo-600">Create a DexVitals account</p>
      <h2 class="mt-3 text-3xl font-semibold text-slate-900">Register as Patient or Doctor</h2>
      <p class="text-slate-500 mt-2">Build your medical profile and get personalized recommendations.</p>
    </div>
    <form method="post" class="grid gap-5">
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Full name</span>
          <input type="text" name="name" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Email</span>
          <input type="email" name="email" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
        </label>
      </div>
      <div class="grid gap-4 sm:grid-cols-3">
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Age</span>
          <input type="number" name="age" min="1" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Sex</span>
          <select name="sex" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none">
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-700">Role</span>
          <select name="role" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none">
            <option value="Patient">Patient</option>
            <option value="Doctor">Doctor</option>
          </select>
        </label>
      </div>
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Password</span>
        <input type="password" name="password" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
      </label>
      <button type="submit" class="rounded-2xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow hover:bg-indigo-700">Create account</button>
      <p class="text-center text-sm text-slate-500">Already have an account? <a href="{{ url_for('login') }}" class="font-semibold text-indigo-600 hover:text-indigo-700">Sign in</a></p>
    </form>
  </section>
{% endblock %}
