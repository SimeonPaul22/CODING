{% extends "base.html" %}

{% block content %}
  <section class="mx-auto max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-md shadow-slate-100">
    <div class="mb-6">
      <p class="text-sm uppercase tracking-[0.3em] text-indigo-600">Secure access</p>
      <h2 class="mt-3 text-3xl font-semibold text-slate-900">Sign in to DexVitals</h2>
      <p class="text-slate-500 mt-2">Access your patient dashboard, track vitals, and export reports.</p>
    </div>
    <form method="post" class="space-y-5">
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Email</span>
        <input type="email" name="email" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
      </label>
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Password</span>
        <input type="password" name="password" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-indigo-500 focus:outline-none" />
      </label>
      <button type="submit" class="w-full rounded-2xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow hover:bg-indigo-700">Sign in</button>
      <p class="text-center text-sm text-slate-500">New to DexVitals? <a href="{{ url_for('register') }}" class="font-semibold text-indigo-600 hover:text-indigo-700">Create an account</a></p>
    </form>
  </section>
{% endblock %}
